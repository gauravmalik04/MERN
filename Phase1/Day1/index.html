<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div Alignment</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="parent-div">
        <div style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;" class="child-div" id="div1">This is Division 1</div>
        <div style="font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;" id="div2" class="child-div">This is Division 2</div>
        <div style="font-family: Georgia, 'Times New Roman', Times, serif;" id="div3" class="child-div">This is Division 3</div>
    </div>
</body>
</html>
